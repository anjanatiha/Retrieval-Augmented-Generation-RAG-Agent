# .github/workflows/test.yml — Run automated tests on every push and pull request
#
# WHY THIS EXISTS:
#   Without this file, tests only run when someone remembers to run them locally.
#   This workflow runs automatically so every push is checked — catching regressions
#   before they reach the main branch.
#
# WHAT IT DOES:
#   1. Checks out the code
#   2. Installs Python 3.11
#   3. Installs all dependencies
#   4. Runs the local test suite (tests/)
#   5. Runs the HF test suite (huggingface/tests/)
#   6. Reports test results and coverage
#
# NOTE ON OLLAMA:
#   The tests mock all ollama.embed and ollama.chat calls, so Ollama does not
#   need to be installed in CI. Only the file-parsing libraries are real.

name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Local test suite ─────────────────────────────────────────────────────────
  local-tests:
    name: Local tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install runtime and dev dependencies
        run: pip install -r requirements.txt && pip install -e ".[dev]"

      - name: Run local tests with coverage
        run: pytest tests/ --cov=src --cov-report=term-missing -v

  # ── HuggingFace test suite ────────────────────────────────────────────────────
  hf-tests:
    name: HF Space tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install HF Space dependencies
        run: pip install -r huggingface/requirements.txt && pip install pytest pytest-mock pytest-cov

      - name: Run HF tests with coverage
        working-directory: huggingface
        run: pytest tests/ --cov=src --cov-report=term-missing -v
